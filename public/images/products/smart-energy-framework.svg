  <text x="206" y="462" fill="rgba(255,255,255,0.9)" font-size="26" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="500" text-anchor="middle">收集</text>
  <text x="206" y="498" fill="rgba(255,255,255,0.9)" font-size="26" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-weight="500" text-anchor="middle">管理</text>

