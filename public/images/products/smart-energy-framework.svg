      <stop stop-color="#173F88"/>
      <stop offset="0.58" stop-color="#1F4F9F"/>
      <stop offset="1" stop-color="#2663BB"/>
    </linearGradient>
    <linearGradient id="panel" x1="450" y1="120" x2="450" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <linearGradient id="blueCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#76C9F7"/>
      <stop offset="1" stop-color="#5B9EE7"/>
