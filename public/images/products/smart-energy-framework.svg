  <circle cx="812" cy="92" r="10" fill="#8BE5A5"/>
  <circle cx="844" cy="92" r="10" fill="#FFD84F"/>

  <rect x="58" y="176" width="784" height="456" rx="36" fill="url(#panel)" fill-opacity="0.9"/>
  <rect x="88" y="208" width="724" height="394" rx="28" stroke="rgba(255,255,255,0.16)"/>

  <path d="M449.5 240L510 305.5L597 329.5L534 394L519 481L449.5 444.5L380 481L365 394L302 329.5L389 305.5L449.5 240Z" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>

