    <linearGradient id="purpleCard" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#C8BBFF"/>
      <stop offset="1" stop-color="#978FEC"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(450 350) rotate(90) scale(120)">
