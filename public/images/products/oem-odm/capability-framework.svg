    <rect x="476" y="610" width="248" height="84" rx="24" fill="white" stroke="#D7E4F8"/>
    <text x="510" y="662" fill="#163873" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="30" font-weight="700">設計整合</text>

