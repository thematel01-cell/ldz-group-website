<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="70" x2="1490" y2="970" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FBFF"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F4F9FF"/>
      <stop offset="1" stop-color="#DFEBFF"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10306E"/>
      <stop offset="1" stop-color="#2A84DE"/>
    </linearGradient>
    <linearGradient id="chipBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#75BDF7"/>
      <stop offset="1" stop-color="#3B7FDE"/>
    </linearGradient>
    <linearGradient id="chipGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7EDEAE"/>
      <stop offset="1" stop-color="#49B07E"/>
    </linearGradient>
    <linearGradient id="chipPurple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C5BBFF"/>
      <stop offset="1" stop-color="#8E88E8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1040" rx="36" fill="url(#bg)"/>
  <rect x="56" y="52" width="1488" height="936" rx="34" fill="white" stroke="#D5E2F5"/>

  <text x="100" y="126" fill="#0D3170" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="700">LDZ OEM / ODM FRAMEWORK</text>
  <text x="100" y="186" fill="#0D3170" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="54" font-weight="700">OEM / ODM 產品開發整合架構</text>
  <text x="100" y="238" fill="#5C7195" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26">
    <tspan x="100" dy="0">從需求定義、設計整合、樣機驗證到量產導入，建立清楚可執行的產品開發流程。</tspan>
  </text>

  <g>
    <rect x="96" y="300" width="1408" height="530" rx="36" fill="url(#panel)"/>

    <rect x="160" y="368" width="286" height="162" rx="28" fill="url(#chipBlue)"/>
    <text x="303" y="435" text-anchor="middle" fill="white" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="34" font-weight="700">需求定義</text>
    <text x="303" y="477" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20">
      <tspan x="303" dy="0">規格整理 / 應用情境</tspan>
      <tspan x="303" dy="30">產品藍圖</tspan>
    </text>

    <rect x="668" y="324" width="264" height="184" rx="92" fill="url(#core)"/>
    <text x="800" y="420" text-anchor="middle" fill="white" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="38" font-weight="700">LDZ OEM</text>
    <text x="800" y="466" text-anchor="middle" fill="white" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="34" font-weight="700">/ ODM</text>

    <rect x="1154" y="368" width="286" height="162" rx="28" fill="url(#chipGreen)"/>
    <text x="1297" y="435" text-anchor="middle" fill="white" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="34" font-weight="700">量產導入</text>
    <text x="1297" y="477" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20">
      <tspan x="1297" dy="0">供應鏈協作 / 試產</tspan>
      <tspan x="1297" dy="30">製造交付</tspan>
    </text>

    <rect x="668" y="610" width="264" height="150" rx="28" fill="url(#chipPurple)"/>
    <text x="800" y="668" text-anchor="middle" fill="white" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="34" font-weight="700">樣機驗證</text>
    <text x="800" y="706" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="20">
      <tspan x="800" dy="0">Prototype / Test /</tspan>
      <tspan x="800" dy="30">Validation</tspan>
    </text>

    <path d="M446 449H584" stroke="#6CC0F4" stroke-width="12" stroke-linecap="round"/>
    <path d="M1016 449H1154" stroke="#7BD4A0" stroke-width="12" stroke-linecap="round"/>
    <path d="M800 508V610" stroke="#A79EFA" stroke-width="12" stroke-linecap="round"/>
    <circle cx="584" cy="449" r="10" fill="#6CC0F4"/>
    <circle cx="1016" cy="449" r="10" fill="#7BD4A0"/>
    <circle cx="800" cy="610" r="10" fill="#A79EFA"/>

    <rect x="124" y="776" width="236" height="84" rx="22" fill="white" stroke="#D7E4F8"/>
    <text x="242" y="828" text-anchor="middle" fill="#163873" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700">產品規劃</text>

    <rect x="458" y="776" width="236" height="84" rx="22" fill="white" stroke="#D7E4F8"/>
    <text x="576" y="828" text-anchor="middle" fill="#163873" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700">設計整合</text>

    <rect x="906" y="776" width="236" height="84" rx="22" fill="white" stroke="#D7E4F8"/>
    <text x="1024" y="828" text-anchor="middle" fill="#163873" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700">測試修正</text>

    <rect x="1240" y="776" width="236" height="84" rx="22" fill="white" stroke="#D7E4F8"/>
    <text x="1358" y="828" text-anchor="middle" fill="#163873" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="26" font-weight="700">量產準備</text>
  </g>

  <g>
    <rect x="108" y="866" width="1384" height="76" rx="24" fill="#F5F9FF" stroke="#D7E4F8"/>
    <text x="180" y="913" fill="#173A79" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700">Concept</text>
    <text x="405" y="913" fill="#173A79" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700">Integration</text>
    <text x="676" y="913" fill="#173A79" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700">Prototype</text>
    <text x="935" y="913" fill="#173A79" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700">Validation</text>
    <text x="1198" y="913" fill="#173A79" font-family="Arial, 'Microsoft JhengHei', sans-serif" font-size="28" font-weight="700">Production</text>
  </g>
</svg>
